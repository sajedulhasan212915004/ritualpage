<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mortocan Ritual</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap");

      :root {
        --background: #0d0d0d;
        --foreground: #ece6d7;
        --surface-elevated: #1a1a1a;
        --muted-foreground: #9d9788;
        --border: #332f26;
        --gold: #c9a94f;
        --gold-light: #e2c87b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font-family: "Inter", sans-serif;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 24px;
      }

      .lang-switcher {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 100;
        display: flex;
        background: var(--surface-elevated);
        border: 1px solid var(--border);
        border-radius: 999px;
        overflow: hidden;
      }

      .lang-btn {
        border: 0;
        background: transparent;
        color: var(--muted-foreground);
        padding: 8px 16px;
        font-size: 11px;
        letter-spacing: 0.25em;
        cursor: pointer;
      }

      .lang-btn.active {
        background: var(--gold);
        color: #111;
      }

      .hero {
        text-align: center;
        padding: 84px 24px 64px;
      }

      .logo {
        width: 70px;
        height: 70px;
        object-fit: contain;
        margin-bottom: 22px;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }

      .brand {
        color: var(--gold);
        font-size: 11px;
        letter-spacing: 0.25em;
        margin: 0 0 16px;
      }

      .title {
        font-size: clamp(2rem, 6vw, 3.1rem);
        line-height: 1.12;
        margin-bottom: 20px;
      }

      .divider {
        width: 64px;
        height: 1px;
        margin: 0 auto;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
      }

      .intro {
        margin: 30px auto 0;
        max-width: 520px;
      }

      .intro p {
        margin: 0 0 8px;
        color: var(--muted-foreground);
        line-height: 1.75;
      }

      section {
        padding: 44px 0;
      }

      .section-alt {
        background: var(--surface-elevated);
      }

      .section-title {
        margin-bottom: 24px;
      }

      .part {
        color: var(--gold);
        font-size: 11px;
        letter-spacing: 0.2em;
        margin-bottom: 8px;
        text-transform: uppercase;
      }

      .section-title h2 {
        font-size: clamp(1.9rem, 5vw, 2.2rem);
      }

      .quick-list,
      .usage-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .quick-list li {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      .diamond {
        color: var(--gold);
        margin-top: 3px;
      }

      .copy {
        color: var(--muted-foreground);
        line-height: 1.75;
        margin: 0 0 14px;
      }

      .safety .copy {
        color: #cbc3b0;
        font-weight: 500;
      }

      .usage-item {
        margin-bottom: 22px;
      }

      .usage-item h3 {
        color: var(--gold-light);
        margin: 0 0 6px;
        font-size: 1.25rem;
      }

      .email {
        display: inline-block;
        margin-top: 8px;
        color: var(--gold);
      }

      footer {
        text-align: center;
        padding: 56px 24px 72px;
        border-top: 1px solid var(--border);
      }

      .closing {
        color: var(--gold);
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.25rem, 4vw, 1.5rem);
        letter-spacing: 0.15em;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>

      const sectionsRoot = document.getElementById("sections");

      function divider() {
        const d = document.createElement("div");
        d.className = "divider";
        d.style.marginTop = "16px";
        return d;
      }

      function render(lang) {
        const t = content[lang];
        document.documentElement.lang = lang;

        document.getElementById("pageTitle").textContent = t.pageTitle;
        document.getElementById("quickStartTitle").textContent = t.quickStartTitle;
        document.getElementById("closing").textContent = t.closing;

        const intro = document.getElementById("heroIntro");
        intro.innerHTML = "";
        t.heroIntro.forEach((line) => {
          const p = document.createElement("p");
          p.textContent = line;
          intro.appendChild(p);
        });

        const quickList = document.getElementById("quickStartList");
        quickList.innerHTML = "";
        t.quickStart.forEach((item) => {
          const li = document.createElement("li");
          li.innerHTML = '<span class="diamond">◆</span><p class="copy"></p>';
          li.querySelector("p").textContent = item;
          quickList.appendChild(li);
        });

        sectionsRoot.innerHTML = "";
        t.sections.forEach((section, index) => {
          const sec = document.createElement("section");
          if (index % 2 === 1) sec.classList.add("section-alt");

          const container = document.createElement("div");
          container.className = "container";

          const titleWrap = document.createElement("div");
          titleWrap.className = "section-title";

          if (section.number) {
            const part = document.createElement("div");
            part.className = "part";
            part.textContent = "Part " + section.number;
            titleWrap.appendChild(part);
          }

          const h2 = document.createElement("h2");
          h2.textContent = section.title;
          titleWrap.appendChild(h2);
          titleWrap.appendChild(divider());
          container.appendChild(titleWrap);

          if (section.content) {
            section.content.forEach((paragraph) => {
              const p = document.createElement("p");
              p.className = "copy";
              p.textContent = paragraph;
              container.appendChild(p);
            });
          }

          if (section.title === "Safety Warning" || section.title === "Avertissement de securite") {
            sec.classList.add("safety");
          }

          if (section.usages) {
            const usageList = document.createElement("div");
            usageList.className = "usage-list";
            section.usages.forEach((u) => {
              const item = document.createElement("div");
              item.className = "usage-item";
              const h3 = document.createElement("h3");
              h3.textContent = u.label;
              const p = document.createElement("p");
              p.className = "copy";
              p.textContent = u.text;
              item.appendChild(h3);
              item.appendChild(p);
              usageList.appendChild(item);
            });
            container.appendChild(usageList);
          }

          if (section.email) {
            const a = document.createElement("a");
            a.className = "email";
            a.href = "mailto:" + section.email;
            a.textContent = section.email;
            container.appendChild(a);
          }

          sec.appendChild(container);
          sectionsRoot.appendChild(sec);
        });

        document.querySelectorAll(".lang-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.lang === lang);
        });
      }

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.addEventListener("click", () => render(btn.dataset.lang));
      });

      render("en");
